runtime:
  run_name: notebook-dense-custom
  notebook: true
  mount_drive: true
  drive_path: /content/drive
  hf_token: ""
  wandb_api_key: ""
  install_gpu_extras: true
  install_moe: false
  install_hybrid: false
  fp8: false
  fp8_recipe: tensorwise
  compile: true
  checkpoint_mode: full
  checkpoint_pattern: CCN
  no_ckpt_last_n: 4
  wandb: true
  wandb_project: everdream
  wandb_mode: online
  output_dir: /content/drive/MyDrive/everdream
  checkpoint_path: /content/drive/MyDrive/everdream/checkpoints/dense_custom_d26

tokenizer:
  source: hf
  path: mistralai/Mistral-7B-v0.3
  ensure_chat_special_tokens: true

training:
  max_seq_len: 2048
  device_batch_size: 16
  total_batch_size: 524288
  target_tokens: -1
  target_param_data_ratio: 10.5
  eval_every: 500
  eval_tokens: 1048576
  eval_modes: [bpb, sample]
  split_tokens: 524288
  core_metric_every: -1
  core_metric_max_per_task: -1
  sample_every: -1
  save_every: 1000
  resume_from_step: -1
  embedding_lr: 0.3
  unembedding_lr: 0.004
  matrix_lr: 0.02
  scalar_lr: 0.5
  weight_decay: 0.2
  adam_beta1: 0.8
  adam_beta2: 0.95
  warmup_ratio: 0.0
  warmdown_ratio: 0.5
  final_lr_frac: 0.0

model:
  family: dense_custom
  depth: 26
  aspect_ratio: 64
  head_dim: 128
  window_pattern: L

datasets:
  - name: climbmix
    source: https://huggingface.co/datasets/karpathy/climbmix-400b-shuffle/resolve/main
    local_dir: /content/drive/MyDrive/everdream/climbmix-400b-shuffle
    weight: 0.8
    max_shard_index: 6542
    num_train_shards: 170
    val_shard_index: 6542
    num_download_workers: 4
  - name: the_stack_dedup_python
    source: https://huggingface.co/datasets/bigcode/the-stack-dedup/resolve/main/data/python
    local_dir: /content/drive/MyDrive/everdream/the-stack-dedup-python
    weight: 0.1
    text_field: content
    filename_template: data-{index:05d}-of-00144.parquet
    max_shard_index: 143
    num_train_shards: 8
    val_shard_index: 143
    num_download_workers: 2
  - name: nemotron_math_4plus
    source: https://huggingface.co/datasets/nvidia/Nemotron-CC-Math-v1/resolve/main/4plus
    local_dir: /content/drive/MyDrive/everdream/nemotron-cc-math-4plus
    weight: 0.1
    filename_template: part_{index:06d}.parquet
    max_shard_index: 45
    num_train_shards: 20
    val_shard_index: 45
    num_download_workers: 2
