runtime:
  run_name: hybrid-deltanet
  wandb: false
tokenizer:
  source: local
training:
  max_seq_len: 2048
  device_batch_size: 16
  total_batch_size: 524288
  target_param_data_ratio: 10.5
model:
  family: hybrid
  depth: 16
  d_model: 1024
  n_heads: 8
  window_pattern: L
  layer_pattern: DDDADDDADDDADDDA
  chunk_size: 64
datasets:
  - name: climbmix
    source: https://huggingface.co/datasets/karpathy/climbmix-400b-shuffle/resolve/main
    local_dir: ""
    weight: 1.0
