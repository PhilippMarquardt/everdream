runtime:
  run_name: dense-mix-example
  wandb: true
  wandb_project: everdream
  install_hybrid: false
tokenizer:
  source: local
training:
  max_seq_len: 2048
  device_batch_size: 16
  total_batch_size: 524288
  target_param_data_ratio: 10.5
model:
  family: dense
  depth: 26
  aspect_ratio: 64
  head_dim: 128
  window_pattern: L
datasets:
  - name: climbmix
    source: https://huggingface.co/datasets/karpathy/climbmix-400b-shuffle/resolve/main
    local_dir: ""
    weight: 0.8
    max_shard_index: 6542
    num_train_shards: 170
    val_shard_index: 6542
  - name: my_extra_mix
    source: https://example.com/my-parquet-dataset
    local_dir: ""
    weight: 0.2
