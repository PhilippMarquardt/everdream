runtime:
  run_name: notebook-tokenizer-train
  notebook: true
  mount_drive: true
  drive_path: /content/drive
  hf_token: ""
  wandb_api_key: ""
  install_gpu_extras: false
  install_moe: false
  install_hybrid: false
  seed: 42

tokenizer:
  source: local
  trainer: rustbpe
  output_dir: /content/drive/MyDrive/everdream/tokenizer
  vocab_size: 32768
  ensure_chat_special_tokens: true
  train_split: train
  train_max_chars: 8000000000
  train_doc_cap: 10000
  train_tokenizer_batch_size: 128

datasets:
  - name: climbmix
    source: https://huggingface.co/datasets/karpathy/climbmix-400b-shuffle/resolve/main
    local_dir: /content/drive/MyDrive/everdream/climbmix-400b-shuffle
    weight: 0.8
    max_shard_index: 6542
    num_train_shards: 340
    val_shard_index: 6542
    num_download_workers: 4
  - name: the_stack_dedup_python
    source: bigcode/the-stack-dedup
    weight: 0.0166666667
    hf_data_dir: data/python
    text_field: content
  - name: the_stack_dedup_javascript
    source: bigcode/the-stack-dedup
    weight: 0.0166666667
    hf_data_dir: data/javascript
    text_field: content
  - name: the_stack_dedup_typescript
    source: bigcode/the-stack-dedup
    weight: 0.0166666667
    hf_data_dir: data/typescript
    text_field: content
  - name: the_stack_dedup_java
    source: bigcode/the-stack-dedup
    weight: 0.0166666667
    hf_data_dir: data/java
    text_field: content
  - name: the_stack_dedup_go
    source: bigcode/the-stack-dedup
    weight: 0.0166666666
    hf_data_dir: data/go
    text_field: content
  - name: the_stack_dedup_rust
    source: bigcode/the-stack-dedup
    weight: 0.0166666666
    hf_data_dir: data/rust
    text_field: content
  - name: nemotron_math_4plus
    source: https://huggingface.co/datasets/nvidia/Nemotron-CC-Math-v1/resolve/main/4plus
    local_dir: /content/drive/MyDrive/everdream/nemotron-cc-math-4plus
    weight: 0.1
    filename_template: part_{index:06d}.parquet
    max_shard_index: 45
    num_train_shards: 32
    val_shard_index: 45
    num_download_workers: 2
