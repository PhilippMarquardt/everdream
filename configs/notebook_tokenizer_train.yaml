runtime:
  run_name: notebook-tokenizer-train
  notebook: true
  mount_drive: true
  drive_path: /content/drive
  hf_token: ""
  wandb_api_key: ""
  install_gpu_extras: false
  install_moe: false
  install_hybrid: false
  seed: 42

tokenizer:
  source: local
  trainer: rustbpe
  output_dir: /content/drive/MyDrive/everdream/tokenizer
  vocab_size: 32768
  ensure_chat_special_tokens: true
  train_split: train
  train_max_chars: 10000000000
  train_doc_cap: 10000
  train_tokenizer_batch_size: 128

datasets:
  - name: climbmix
    source: https://huggingface.co/datasets/karpathy/climbmix-400b-shuffle/resolve/main
    local_dir: /content/drive/MyDrive/everdream/climbmix-400b-shuffle
    weight: 0.7
    max_shard_index: 6542
    num_train_shards: 340
    val_shard_index: 6542
    num_download_workers: 4
  - name: the_stack_dedup_python
    source: https://huggingface.co/datasets/bigcode/the-stack-dedup/resolve/main/data/python
    local_dir: /content/drive/MyDrive/everdream/the-stack-dedup/python
    weight: 0.0166666667
    text_field: content
    filename_template: data-{index:05d}-of-00144.parquet
    max_shard_index: 143
    num_train_shards: 20
    val_shard_index: 143
    num_download_workers: 4
